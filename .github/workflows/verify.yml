name: Verify CoachClip MVP

on:
  push:
    branches: [ main, google/fix-production-gaps ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install System Dependencies (FFmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Node Dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Verify (Lint, Typecheck, Unit Tests, Build, Smoke Tests, E2E)
        run: npm run verify

      - name: Upload Test Artifacts on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore

  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Build Docker Image
        run: docker build -t coachclip:ci .

      - name: Run Docker Container
        run: |
          docker run -d --rm \
            --name coachclip-ci \
            -p 3000:3000 \
            -e MAX_CONCURRENT_EXPORTS=2 \
            -e FFMPEG_TIMEOUT_SECONDS=120 \
            -e CORS_ORIGIN=http://localhost:3000 \
            coachclip:ci

      - name: Wait for Healthcheck
        run: |
          for i in {1..20}; do
            if curl -s http://127.0.0.1:3000/api/live | grep -q '"status":"ok"'; then
              echo "Liveness check passed!"
              if curl -s http://127.0.0.1:3000/api/ready | grep -q '"status":"ready"'; then
                echo "Readiness check passed!"
                exit 0
              fi
            fi
            echo "Waiting for container to become healthy..."
            sleep 2
          done
          echo "Healthcheck failed!"
          docker logs coachclip-ci
          exit 1

      - name: Run API Smoke Test against Container
        env:
          SMOKE_API_BASE_URL: http://127.0.0.1:3000
        run: |
          npm ci
          npx tsx scripts/smokeApiSimple.ts

      - name: Stop Container
        if: always()
        run: |
          docker stop coachclip-ci || true
